<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/main.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="/images/banner-sm.jpg 500w, /images/banner.jpg 1000w"
          alt="Image of high mountain lake with camping gear"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
      </div>

      <section class="mission">
        <p>We believe that spending time outside is the best way to live life to the fullest.</p>
      </section>

      <section class="products">
        <h2>Product Categories</h2>
        <div class="product-grid">
          <a href="/product_listing/index.html?category=tents">
            <img src="/images/category-tents.svg" alt="Tents" />
            <h3>Tents</h3>
          </a>
          <a href="/product_listing/index.html?category=backpacks">
            <img src="/images/category-backpacks.svg" alt="Backpacks" />
            <h3>Backpacks</h3>
          </a>
          <a href="/product_listing/index.html?category=sleeping-bags">
            <img src="/images/category-sleepingbags.svg" alt="Sleeping Bags" />
            <h3>Sleeping Bags</h3>
          </a>
          <a href="/product_listing/index.html?category=hammocks">
            <img src="/images/category-hammocks.svg" alt="Hammocks" />
            <h3>Hammocks</h3>
          </a>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
